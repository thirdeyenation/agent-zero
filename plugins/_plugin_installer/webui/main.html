<html>

<head>
    <title>Install Plugin</title>
    <script type="module">
        import { store } from "/plugins/_plugin_installer/webui/pluginInstallStore.js";
    </script>
</head>

<body>
    <div x-data>
        <template x-if="$store.pluginInstallStore">
            <div x-create="$store.pluginInstallStore.setTab('store')"
                x-destroy="$store.pluginInstallStore.refreshPluginList()">

                <ul class="nav nav-tabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" :class="{ active: $store.pluginInstallStore.activeTab === 'store' }"
                            type="button" role="tab" @click="$store.pluginInstallStore.setTab('store')">
                            <span class="material-symbols-outlined pi-tab-icon">store</span> Browse
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" :class="{ active: $store.pluginInstallStore.activeTab === 'git' }"
                            type="button" role="tab" @click="$store.pluginInstallStore.setTab('git')">
                            <span class="material-symbols-outlined pi-tab-icon">terminal</span> Git
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" :class="{ active: $store.pluginInstallStore.activeTab === 'zip' }"
                            type="button" role="tab" @click="$store.pluginInstallStore.setTab('zip')">
                            <span class="material-symbols-outlined pi-tab-icon">upload_file</span> ZIP
                        </button>
                    </li>
                </ul>

                <template x-if="$store.pluginInstallStore.activeTab === 'store'">
                    <x-component path="/plugins/_plugin_installer/webui/install-index.html"></x-component>
                </template>

                <template x-if="$store.pluginInstallStore.activeTab === 'git'">
                    <x-component path="/plugins/_plugin_installer/webui/install-git.html"></x-component>
                </template>

                <template x-if="$store.pluginInstallStore.activeTab === 'zip'">
                    <x-component path="/plugins/_plugin_installer/webui/install-zip.html"></x-component>
                </template>

            </div>
        </template>
    </div>

    <style>
        /* ── Tabs ─────────────────────────────── */
        .nav {
            display: flex;
            padding-left: 0;
            margin: 0 0 1rem 0;
            list-style: none;
            border-bottom: 1px solid var(--color-border);
            gap: 0.25rem;
        }

        .nav-link {
            font-family: "Rubik", Arial, Helvetica, sans-serif;
            border: 1px solid transparent;
            border-top-left-radius: 4px;
            border-top-right-radius: 4px;
            padding: 0.4rem 0.7rem;
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .nav-link.active {
            color: var(--color-text-primary);
            border-color: var(--color-border);
            border-bottom-color: transparent;
            background: var(--color-background);
        }

        .pi-tab-icon {
            font-size: 1.1rem;
        }

        /* ── Store Tab ───────────────────────── */
        .pi-browse-shell {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            font-family: "Rubik", Arial, Helvetica, sans-serif;
        }

        .pi-browse-shell button,
        .pi-browse-shell input,
        .pi-browse-shell select {
            font-family: inherit;
        }

        .pi-browse-hero {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.25rem 0 0.35rem;
        }

        .pi-browse-copy {
            max-width: 44rem;
        }

        .pi-browse-eyebrow {
            margin-bottom: 0.4rem;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--color-highlight);
        }

        .pi-browse-title {
            margin: 0;
            font-size: 1.6rem;
            line-height: 1.15;
            color: var(--color-text-primary);
        }

        .pi-browse-description {
            margin: 0.5rem 0 0;
            max-width: 38rem;
            font-size: 0.95rem;
            line-height: 1.55;
            color: var(--color-text-secondary);
        }

        .pi-browse-summary {
            flex-shrink: 0;
            padding: 0.6rem 0.85rem;
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            background: var(--color-panel);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .pi-index-toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: stretch;
        }

        .pi-search-field,
        .pi-sort-field {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            padding: 0.55rem 0;
            border: 0;
            border-bottom: 1px solid var(--color-border);
            border-radius: 0;
            background: transparent;
        }

        .pi-search-field {
            flex: 1;
            min-width: 0;
        }

        .pi-search-field .material-symbols-outlined {
            font-size: 1.15rem;
            color: var(--color-text-muted);
        }

        .pi-search-input {
            width: 100%;
            min-width: 0;
            padding: 0;
            border: 0;
            outline: none;
            background: transparent;
            color: var(--color-text-primary);
            font-size: 0.95rem;
        }

        .pi-sort-field {
            min-width: 160px;
            flex-shrink: 0;
            justify-content: space-between;
        }

        .pi-field-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--color-text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .pi-sort-select {
            width: 100%;
            padding: 0;
            border: 0;
            outline: none;
            background: transparent;
            color: var(--color-text-primary);
            font-size: 0.95rem;
        }

        .pi-filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .pi-filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            padding: 0.45rem 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: 0.5rem;
            background: var(--color-panel);
            color: var(--color-text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, color 0.15s;
        }

        .pi-filter-chip:hover {
            color: var(--color-text-primary);
            background: rgba(255, 255, 255, 0.04);
        }

        .pi-filter-chip.active {
            border-color: var(--color-border);
            background: rgba(255, 255, 255, 0.08);
            color: var(--color-text-primary);
        }

        .pi-filter-count {
            padding: 0.12rem 0.4rem;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.06);
            color: var(--color-text-muted);
            font-size: 0.75rem;
        }

        .pi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 0.95rem;
        }

        .pi-card {
            width: 100%;
            padding: 0;
            border: 1px solid var(--color-border);
            border-radius: 16px;
            background: var(--color-background);
            color: inherit;
            text-align: left;
            cursor: pointer;
            transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .pi-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
        }

        .pi-card-thumb {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 148px;
            padding: 1rem;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.16) 0%, var(--color-panel) 100%),
                var(--color-panel);
            border-bottom: 1px solid var(--color-border);
        }

        .pi-card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .pi-card-placeholder {
            font-size: 4rem;
            color: var(--color-text-muted);
        }

        .pi-card-installed-pill {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            padding: 0.24rem 0.5rem;
            border-radius: 8px;
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            font-size: 0.72rem;
            font-weight: 700;
        }

        .pi-card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding: 1rem;
        }

        .pi-card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .pi-card-heading {
            min-width: 0;
        }

        .pi-card-title {
            margin: 0;
            font-size: 1rem;
            line-height: 1.25;
            color: var(--color-text-primary);
        }

        .pi-card-subtitle {
            margin-top: 0.25rem;
            font-size: 0.82rem;
            color: var(--color-text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pi-card-arrow {
            font-size: 1rem;
            color: var(--color-text-muted);
            flex-shrink: 0;
        }

        .pi-card-desc {
            font-size: 0.88rem;
            line-height: 1.5;
            color: var(--color-text-secondary);
        }

        .pi-card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            padding: 0.9rem 1rem 1rem;
            border-top: 1px solid var(--color-border);
        }

        .pi-card-stars {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.85rem;
            color: var(--color-text-secondary);
        }

        .pi-card-stars .material-symbols-outlined {
            font-size: 1rem;
            color: #fbbf24;
        }

        .pi-card-tag {
            padding: 0.22rem 0.55rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--color-panel);
            color: var(--color-text-secondary);
            border: 1px solid var(--color-border);
        }

        .pi-state-card {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 1rem 1.05rem;
            border: 1px solid var(--color-border);
            border-radius: 14px;
            background: var(--color-panel);
        }

        .pi-state-card .material-symbols-outlined {
            font-size: 1.5rem;
        }

        .pi-state-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .pi-state-text {
            margin-top: 0.15rem;
            font-size: 0.88rem;
            color: var(--color-text-secondary);
        }

        .pi-state-loading .material-symbols-outlined {
            color: var(--color-highlight);
        }

        .pi-state-empty .material-symbols-outlined {
            color: var(--color-text-muted);
        }

        .pi-pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.4rem 0 0.1rem;
        }

        .pi-page-info {
            font-size: 0.9rem;
            color: var(--color-text-secondary);
        }

        @media (max-width: 720px) {
            .pi-browse-hero {
                flex-direction: column;
            }

            .pi-index-toolbar {
                flex-direction: column;
            }

            .pi-sort-field {
                min-width: 0;
            }
        }

        @media (max-width: 500px) {
            .pi-card-thumb {
                height: 164px;
            }
        }

        /* ── Git Tab ─────────────────────────── */
        .pi-form-group {
            margin-bottom: 1rem;
        }

        .pi-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        .pi-optional {
            font-weight: 400;
            color: var(--color-text-secondary);
            font-size: 0.85rem;
        }

        .pi-input {
            width: 100%;
            padding: 0.6rem 0.75rem;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            background: var(--color-bg-primary);
            color: var(--color-text-primary);
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .pi-hint {
            margin-top: 0.35rem;
            font-size: 0.8rem;
            color: var(--color-text-secondary);
        }

        .pi-actions {
            display: flex;
            justify-content: flex-start;
            margin: 1rem 0;
        }

        /* ── ZIP Tab ─────────────────────────── */
        .pi-upload-section {
            text-align: center;
            padding: 2rem 1rem;
            border: 2px dashed var(--color-border);
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        .pi-upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
        }

        .pi-upload-btn.pi-has-file {
            background: var(--color-panel);
            border-color: var(--color-highlight);
        }

        .pi-actions-center {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }

        /* ── Shared ──────────────────────────── */
        .pi-loading {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-secondary);
        }

        .pi-empty {
            text-align: center;
            padding: 2rem;
            color: var(--color-text-secondary);
        }

        .pi-button-loading {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .pi-result {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 4px;
            margin-top: 0.75rem;
        }

        .pi-result-icon .material-symbols-outlined {
            font-size: 2rem;
            color: #22c55e;
        }

        .pi-result-path {
            font-size: 0.85rem;
            color: var(--color-text-secondary);
            margin-top: 0.25rem;
            font-family: var(--font-family-code);
        }

        @media (max-width: 500px) {
            .pi-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>

</html>
