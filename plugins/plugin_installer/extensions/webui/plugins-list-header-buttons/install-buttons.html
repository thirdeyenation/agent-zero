<span x-data="{ open: false }">
    <script type="module">
        import { store } from "/plugins/plugin_installer/webui/pluginInstallStore.js";
    </script>

    <div class="pi-install-wrapper" @click.outside="open = false">
        <button type="button"
            class="button"
            @click="open = !open">
            <span class="icon material-symbols-outlined">add</span> Install
            <span class="material-symbols-outlined pi-chevron"
                :class="{ 'pi-chevron-open': open }">expand_more</span>
        </button>

        <div class="pi-dropdown" x-show="open" x-cloak x-transition.opacity.duration.150ms>
            <button type="button" class="pi-dropdown-item"
                @click="open = false; openModal('../plugins/plugin_installer/webui/install-index.html')">
                <span class="material-symbols-outlined">store</span>
                <span class="pi-item-text">
                    <span class="pi-item-title">Browse Plugins</span>
                    <span class="pi-item-desc">Explore the community index</span>
                </span>
            </button>
            <div class="pi-dropdown-sep"></div>
            <button type="button" class="pi-dropdown-item"
                @click="open = false; openModal('../plugins/plugin_installer/webui/install-git.html')">
                <span class="material-symbols-outlined">terminal</span>
                <span class="pi-item-text">
                    <span class="pi-item-title">Clone from Git</span>
                    <span class="pi-item-desc">Install from a repository URL</span>
                </span>
            </button>
            <button type="button" class="pi-dropdown-item"
                @click="open = false; openModal('../plugins/plugin_installer/webui/install-zip.html')">
                <span class="material-symbols-outlined">upload_file</span>
                <span class="pi-item-text">
                    <span class="pi-item-title">Upload ZIP</span>
                    <span class="pi-item-desc">Install from a local archive</span>
                </span>
            </button>
        </div>
    </div>

    <style>
        .plugins-toolbar-actions {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .pi-install-wrapper {
            position: relative;
        }

        .pi-install-wrapper > .button {
            gap: 0.25rem;
        }

        .pi-chevron {
            font-size: 1.1rem !important;
            transition: transform 0.2s ease;
        }

        .pi-chevron-open {
            transform: rotate(180deg);
        }

        .pi-dropdown {
            position: absolute;
            top: calc(100% + 0.35rem);
            right: 0;
            min-width: 230px;
            background: var(--color-panel);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
            z-index: 100;
            padding: 0.3rem;
        }

        .pi-dropdown-item {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            width: 100%;
            padding: 0.5rem 0.6rem;
            background: none;
            border: none;
            border-radius: 5px;
            color: var(--color-text);
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 0.875rem;
            transition: background 0.12s ease;
        }

        .pi-dropdown-item:hover {
            background: var(--color-background);
        }

        .pi-dropdown-item .material-symbols-outlined {
            font-size: 1.25rem;
            color: var(--color-text-secondary);
            flex-shrink: 0;
        }

        .pi-dropdown-item:hover .material-symbols-outlined {
            color: var(--color-highlight);
        }

        .pi-item-text {
            display: flex;
            flex-direction: column;
        }

        .pi-item-title {
            font-weight: 500;
            line-height: 1.3;
        }

        .pi-item-desc {
            font-size: 0.75rem;
            color: var(--color-text-secondary);
            line-height: 1.3;
        }

        .pi-dropdown-sep {
            height: 1px;
            background: var(--color-border);
            margin: 0.2rem 0.5rem;
        }

        [x-cloak] { display: none !important; }
    </style>
</span>
