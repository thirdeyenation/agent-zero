<html>
<head>
    <title>Code Execution</title>
</head>

<body>
    <div x-data>
        <template x-if="$store.pluginSettings.settings">
            <div>
                <div class="section-title">Code Execution</div>
                <div class="section-description">
                    Configuration for the code execution tool. Controls the shell interface, SSH credentials, execution timeouts, and prompt/dialog detection patterns.
                </div>

                <!-- Shell Interface -->
                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Use SSH</div>
                        <div class="field-description">
                            When enabled, code execution connects via SSH using the credentials below. When disabled, a local Python TTY is used.
                        </div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="$store.pluginSettings.settings.ssh_enabled" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- SSH credentials (shown only when SSH is enabled) -->
                <template x-if="$store.pluginSettings.settings.ssh_enabled">
                    <div>
                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">SSH Address</div>
                                <div class="field-description">Hostname or IP of the SSH target.</div>
                            </div>
                            <div class="field-control">
                                <input type="text" x-model="$store.pluginSettings.settings.ssh_addr" placeholder="localhost" />
                            </div>
                        </div>

                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">SSH Port</div>
                                <div class="field-description">SSH port on the target host.</div>
                            </div>
                            <div class="field-control">
                                <input type="number" min="1" max="65535" x-model.number="$store.pluginSettings.settings.ssh_port" />
                            </div>
                        </div>

                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">SSH User</div>
                                <div class="field-description">Username for SSH login.</div>
                            </div>
                            <div class="field-control">
                                <input type="text" x-model="$store.pluginSettings.settings.ssh_user" placeholder="root" />
                            </div>
                        </div>

                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">SSH Password</div>
                                <div class="field-description">Password for SSH login.</div>
                            </div>
                            <div class="field-control">
                                <input type="password" autocomplete="off" x-model="$store.pluginSettings.settings.ssh_pass" />
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Execution timeouts -->
                <div class="section-title">Execution Timeouts</div>
                <div class="section-description">
                    Timeouts (in seconds) for python, nodejs, and terminal runtimes.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">First output timeout</div>
                        <div class="field-description">Seconds to wait for the first output before returning control to the agent.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" x-model.number="$store.pluginSettings.settings.code_exec_first_output_timeout" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Between output timeout</div>
                        <div class="field-description">Seconds to wait between output chunks before returning control.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" x-model.number="$store.pluginSettings.settings.code_exec_between_output_timeout" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Max execution timeout</div>
                        <div class="field-description">Hard cap on total execution time in seconds.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" x-model.number="$store.pluginSettings.settings.code_exec_max_exec_timeout" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Dialog detection timeout</div>
                        <div class="field-description">Seconds of idle output before checking for dialog prompts.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" x-model.number="$store.pluginSettings.settings.code_exec_dialog_timeout" />
                    </div>
                </div>

                <!-- Output runtime timeouts -->
                <div class="section-title">Output Runtime Timeouts</div>
                <div class="section-description">
                    Timeouts (in seconds) for the "output" runtime (waiting for long-running processes).
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">First output timeout</div>
                        <div class="field-description">Seconds to wait for the first output.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" x-model.number="$store.pluginSettings.settings.output_first_output_timeout" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Between output timeout</div>
                        <div class="field-description">Seconds to wait between output chunks.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" x-model.number="$store.pluginSettings.settings.output_between_output_timeout" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Max execution timeout</div>
                        <div class="field-description">Hard cap on total wait time in seconds.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" x-model.number="$store.pluginSettings.settings.output_max_exec_timeout" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Dialog detection timeout</div>
                        <div class="field-description">Seconds of idle output before checking for dialog prompts.</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="1" x-model.number="$store.pluginSettings.settings.output_dialog_timeout" />
                    </div>
                </div>

                <!-- Patterns -->
                <div class="section-title">Detection Patterns</div>
                <div class="section-description">
                    Regular expressions used to detect shell prompts and interactive dialogs. One pattern per line.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Prompt patterns</div>
                        <div class="field-description">
                            When any pattern matches the last output lines, execution is considered complete and output is returned immediately.
                        </div>
                    </div>
                    <div class="field-control">
                        <textarea rows="5" x-model="$store.pluginSettings.settings.prompt_patterns"></textarea>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Dialog patterns</div>
                        <div class="field-description">
                            When any pattern matches after the dialog timeout, control is returned to the agent to handle the interactive prompt.
                        </div>
                    </div>
                    <div class="field-control">
                        <textarea rows="4" x-model="$store.pluginSettings.settings.dialog_patterns"></textarea>
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>

</html>
