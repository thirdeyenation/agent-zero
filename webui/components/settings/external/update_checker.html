<html>
  <head>
    <title>Update Checker</title>
  </head>

  <body>
    <div x-data="{ get settings() { return $store.settings.settings } }">
      <template x-if="settings">
        <div>
          <div class="section-title">Update Checker</div>
          <div class="section-description">
            Update checker periodically checks for new releases of Agent Zero and will notify when an update is recommended.<br>No personal data is sent to the update server, only randomized+anonymized unique ID and current version number, which help us evaluate the importance of the update in case of critical bug fixes etc.
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Enable Update Checker</div>
              <div class="field-description">Enable update checker to notify about newer versions of Agent Zero.</div>
            </div>
            <div class="field-control">
              <label class="toggle">
                <input type="checkbox" x-model="settings.update_check_enabled" />
                <span class="toggler"></span>
              </label>
            </div>
          </div>

          <div class="field">
            <div class="field-label">
              <div class="field-title">Manual Self Update</div>
              <div class="field-description">
                Schedule a branch plus release tag, optionally zip <code>/a0/usr</code>,
                restart Agent Zero, and let the durable bootstrap manager in
                <code>/exe</code> either finish the update or automatically roll back if
                the UI never becomes healthy.
              </div>
              <template x-if="!$store.settings.additional?.is_dockerized">
                <div class="field-description">
                  This action is currently available only in dockerized installs.
                </div>
              </template>
            </div>
            <div class="field-control">
              <button
                class="btn btn-field"
                @click="openModal('settings/external/self-update-modal.html')"
                :disabled="!$store.settings.additional?.is_dockerized"
              >
                Open Self Update
              </button>
            </div>
          </div>
        </div>
      </template>
    </div>
  </body>
</html>
